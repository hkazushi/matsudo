<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="宅建協会松戸支部 ロゴマーク">
  <defs>
    <linearGradient id="lRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fc9a0"/>
      <stop offset="55%" stop-color="#7bb8d6"/>
      <stop offset="100%" stop-color="#eda9bb"/>
    </linearGradient>
    <linearGradient id="lDove" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f7d55"/>
      <stop offset="100%" stop-color="#1a5c38"/>
