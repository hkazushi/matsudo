  </defs>
  <!-- リング -->
  <circle cx="50" cy="50" r="46" fill="#fbfaf6"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#lRing)" stroke-width="6"/>
  <!-- 若葉 -->
  <path d="M50 20 q10 -8 22 -6 q-2 14 -16 16 Z" fill="#8fc9a0"/>
  <!-- ハト(松戸のM+翼) -->
