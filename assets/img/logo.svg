           q-10 -2 -18 3
           q14 2 20 12
           q-16 -4 -26 2
           q10 4 12 14
           q-18 -2 -30 -14
           q-2 8 4 15
           q-8 -2 -6 -12 Z" fill="url(#lDove)"/>
  <!-- 目 -->
  <circle cx="42" cy="44" r="2.4" fill="#fbfaf6"/>
  <!-- ほっぺ(パステル) -->
  <circle cx="36" cy="52" r="4" fill="#f7bcca" opacity="0.7"/>
