<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260" role="img" aria-label="松戸支部イメージキャラクター ハトのまつどくん(仮)">
  <defs>
    <radialGradient id="mBody" cx="42%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f4f9f4"/>
      <stop offset="100%" stop-color="#e3efe6"/>
    </radialGradient>
    <linearGradient id="mWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bfe0b8"/>
      <stop offset="100%" stop-color="#8fc9a0"/>
    </linearGradient>
    <linearGradient id="mHouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7c9d3"/>
      <stop offset="100%" stop-color="#eda9bb"/>
    </linearGradient>
    <linearGradient id="mRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7d3e6"/>
      <stop offset="100%" stop-color="#7bb8d6"/>
    </linearGradient>
    <filter id="mSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5a7a63" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 影 -->
  <ellipse cx="120" cy="240" rx="62" ry="12" fill="#5a7a63" opacity="0.14"/>

  <!-- 尾羽 -->
  <path d="M148 150 q52 6 74 34 q-30 6 -58 -6 q14 16 10 34 q-26 -12 -40 -40 Z" fill="url(#mWing)" opacity="0.92"/>

  <!-- 胴体 -->
  <g filter="url(#mSoft)">
    <path d="M120 46
             c46 0 78 34 78 78
             c0 42 -32 74 -78 74
             c-46 0 -78 -32 -78 -74
             c0 -44 32 -78 78 -78 Z" fill="url(#mBody)"/>
  </g>

  <!-- 翼(手前) -->
  <path d="M70 120 q-26 8 -34 34 q26 4 44 -10 q-8 18 4 34 q22 -16 26 -48 Z" fill="url(#mWing)"/>
  <path d="M64 132 q-14 6 -18 20" fill="none" stroke="#7bb890" stroke-width="2.4" stroke-linecap="round" opacity="0.6"/>

  <!-- ほっぺ -->
  <circle cx="86" cy="128" r="11" fill="#f7bcca" opacity="0.75"/>
  <circle cx="150" cy="128" r="11" fill="#f7bcca" opacity="0.75"/>

  <!-- 目 -->
  <circle cx="100" cy="112" r="7.5" fill="#3a4a40"/>
  <circle cx="136" cy="112" r="7.5" fill="#3a4a40"/>
  <circle cx="102.4" cy="109.4" r="2.4" fill="#fff"/>
  <circle cx="138.4" cy="109.4" r="2.4" fill="#fff"/>

  <!-- くちばし -->
  <path d="M112 124 q8 9 16 0 q-8 6 -16 0 Z" fill="#f0b64e"/>

  <!-- 頭の若葉(松戸=緑) -->
  <path d="M120 40 q-4 -20 12 -30 q6 18 -12 30 Z" fill="url(#mWing)"/>
  <path d="M120 42 q6 -16 24 -16 q-8 16 -24 16 Z" fill="#a9d6b4" opacity="0.9"/>

  <!-- 抱えた家 -->
  <g filter="url(#mSoft)">
    <rect x="96" y="168" width="48" height="40" rx="6" fill="url(#mHouse)"/>
    <path d="M90 170 L120 146 L150 170 Z" fill="url(#mRoof)"/>
    <rect x="112" y="184" width="16" height="24" rx="3" fill="#fff" opacity="0.85"/>
    <circle cx="120" cy="196" r="1.8" fill="#eda9bb"/>
  </g>

  <!-- 足 -->
  <path d="M104 206 l-6 12 M116 208 l0 12" stroke="#f0b64e" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
